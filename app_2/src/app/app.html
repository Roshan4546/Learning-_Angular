<div class="container">
  <h1>Counter App</h1>

  <div>
    <h2>{{count}}</h2>

    <div class="btn">
      <button class="minus" (click) = 'decrement()'>-</button>
      <button class="reset" (click) = 'reset()'>Reset</button>
      <button class="plus" (click) = 'increament()'>+</button>
    </div>

  </div>
</div>
